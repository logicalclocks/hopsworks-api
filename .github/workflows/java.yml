name: java

on: pull_request

jobs:
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Set Timezone
        run: sudo timedatectl set-timezone UTC

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('java/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Test
        working-directory: ./java
        # The spark-4.1 profile pins the Hops Spark fork (4.1.2.0), which CI
        # runners cannot resolve from public repositories, so CI overrides it
        # to build against upstream Apache Spark instead.
        run: mvn clean test -Pspark-4.1 -Dspark.version=4.1.2

  unit_tests_local_tz:
    name: Unit Tests (Local TZ)
