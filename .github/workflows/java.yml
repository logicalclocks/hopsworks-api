          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Test
        working-directory: ./java
        # The spark-4.1 profile pins the Hops Spark fork (4.1.3.0). Its
        # artifacts are public (nexus.hops.works/repository/spark), but their
        # poms depend on io.hops:hadoop-client-* and io.hops.hive:* hosted in
        # the authenticated hops-artifacts repository, which CI (and fork PRs
        # in particular) cannot access, so CI overrides spark.version to build
        # against upstream Apache Spark instead. Hudi likewise pins the Hops
        # fork (io.hops.hudi); until the open hudi repository
        # (nexus.hops.works/repository/hudi) is populated, CI overrides the
        # groupId to build against upstream org.apache.hudi.
        run: mvn clean test -Pspark-4.1 -Dspark.version=4.1.3 -Dhudi.groupId=org.apache.hudi

  unit_tests_spark41:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Set Timezone
        run: sudo timedatectl set-timezone UTC

      - name: Checkout
