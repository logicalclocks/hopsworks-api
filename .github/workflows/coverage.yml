name: coverage

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set Timezone
        run: sudo timedatectl set-timezone UTC && echo UTC | sudo tee /etc/timezone

      - uses: actions/checkout@v4

      - name: Copy README
        run: cp README.md python/

      - uses: actions/setup-python@v5
        name: Setup Python
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: true
          working-directory: python

      - name: Install dependencies
        run: |
          uv cache clean hopsworks
          uv sync --extra dev --project python --reinstall-package hopsworks

      # A transient Maven Central failure while resolving spark-avro kills the
      # Spark JVM at launch (JAVA_GATEWAY_EXITED) and fails every Spark test in
      # the job. Cache the resolved ivy artifacts so warm runs never re-resolve.
      - name: Cache Spark ivy packages
        uses: actions/cache@v4
        with:
          path: ~/.ivy2
          key: ivy-spark-avro-3.5.5

      - name: Set PYSPARK_SUBMIT_ARGS for Avro support
        run: echo "PYSPARK_SUBMIT_ARGS=--packages org.apache.spark:spark-avro_2.13:4.1.1 pyspark-shell" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: |
          pytest python/tests \
            --cov=hopsworks --cov=hsfs --cov=hsml --cov=hopsworks_common

      - name: Coverage comment
        id: coverage_comment
        if: always()
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Store PR comment to be posted
        uses: actions/upload-artifact@v4
        if: always() && steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt
